let sel=1,tab='levels';
const tabs=[{k:'levels',l:'Career levels'},{k:'tools',l:'Tools'},{k:'learning',l:'Learning path'},{k:'interviews',l:'Interviews'},{k:'roles',l:'Roles & salary'}];

function chip(txt,bg,border,color){return `<span class="sk" style="background:${bg};border-color:${border};color:${color}">${txt}</span>`;}

function renderLevels(path){
  const clrs=['#EAF3DE','#E6F1FB','#EEEDFE','#FAEEDA'];
  const cbrs=['#3B6D11','#185FA5','#534AB7','#BA7517'];
  const ctxs=['#27500A','#0C447C','#3C3489','#854F0B'];
  const clrsd=['#173404','#042C53','#26215C','#412402'];
  const cbrsd=['#97C459','#85B7EB','#AFA9EC','#EF9F27'];
  const ctxsd=['#C0DD97','#B5D4F4','#CECBF6','#FAC775'];
  return `<div class="lvlg">${path.levels.map((l,i)=>`
    <div class="lvl">
      <div class="lvlh"><span class="lvlt">${l.title}</span><span class="yrs">${l.yrs}</span></div>
      <div class="lvlf">${l.focus}</div>
      <div class="skls">${l.skills.map(s=>chip(s,dark?clrsd[i]:clrs[i],dark?cbrsd[i]:cbrs[i],dark?ctxsd[i]:ctxs[i])).join('')}</div>
    </div>`).join('')}</div>`;
}

function renderTools(path){
  const coreB=dark?path.ab:path.ab;
  const coreBr=dark?path.a:path.a;
  const coreT=dark?path.at:path.at;
  const grayB=dark?'#2C2C2A':'#F1EFE8';
  const grayBr=dark?'#888780':'#B4B2A9';
  const grayT=dark?'#D3D1C7':'#444441';
  return `<div class="toolg">${path.tools.map(g=>`
    <div class="toolcat">
      <div class="toolcath">${g.cat}</div>
      <div class="tools">${g.items.map(t=>`<span class="tool${t.c?' core':''}" style="background:${t.c?coreB:grayB};border-color:${t.c?coreBr:grayBr};color:${t.c?coreT:grayT}">${t.n}</span>`).join('')}</div>
    </div>`).join('')}</div>`;
}

function renderLearning(path){
  const bg=path.ab;const br=path.a;const tx=path.at;
  const typeCols={Free:{b:dark?'#04342C':'#E1F5EE',br:dark?'#5DCAA5':'#0F6E56',t:dark?'#9FE1CB':'#085041'},Paid:{b:dark?'#412402':'#FAEEDA',br:dark?'#EF9F27':'#BA7517',t:dark?'#FAC775':'#854F0B'},'Mixed':{b:dark?'#26215C':'#EEEDFE',br:dark?'#AFA9EC':'#534AB7',t:dark?'#CECBF6':'#3C3489'},Book:{b:dark?'#04342C':'#E1F5EE',br:dark?'#5DCAA5':'#0F6E56',t:dark?'#9FE1CB':'#085041'},Experience:{b:dark?'#2C2C2A':'#F1EFE8',br:dark?'#888780':'#5F5E5A',t:dark?'#D3D1C7':'#444441'},'Free/Paid':{b:dark?'#26215C':'#EEEDFE',br:dark?'#AFA9EC':'#534AB7',t:dark?'#CECBF6':'#3C3489'},Ongoing:{b:dark?'#2C2C2A':'#F1EFE8',br:dark?'#888780':'#5F5E5A',t:dark?'#D3D1C7':'#444441'}};
  return `<div class="lpg">${path.learning.map((s,i)=>{
    const tc=typeCols[s.type]||typeCols['Mixed'];
    return `<div class="lstep">
      <div class="lnum" style="background:${bg};border-color:${br};color:${tx}">${i+1}</div>
      <div class="lbody">
        <div class="ltitle">${s.title}</div>
        <div class="ldesc">${s.desc}</div>
        <div class="lmeta">
          <span class="ltag">${s.time}</span>
          <span class="ltag" style="background:${tc.b};border-color:${tc.br};color:${tc.t}">${s.type}</span>
        </div>
      </div>
    </div>`;}).join('')}</div>`;
}

function renderInterviews(path){
  const bg=path.ab;const br=path.a;const tx=path.at;
  return `<div class="ivg">${path.interviews.map(c=>`
    <div class="ivc">
      <div class="ivch" style="color:${tx};background:${bg};padding:4px 9px;border-radius:8px;display:inline-block;margin-bottom:8px;border:0.5px solid ${br}">${c.cat}</div>
      <div class="ivcs">${c.topics.map(t=>`<div class="ivct">${t}</div>`).join('')}</div>
    </div>`).join('')}</div>`;
}

function renderRoles(path){
  return `<div class="rg">${path.roles.map(r=>`
    <div class="row">
      <div class="rjt">${r.title}</div>
      <div class="ryrs">${r.yrs}</div>
      <div class="rbar"><div class="rbarfill" style="width:${r.pct}%;background:${path.a}"></div></div>
      <div class="rsal" style="color:${path.a}">${r.sal}</div>
    </div>`).join('')}</div>`;
}

function render(){
  const pg=document.getElementById('pg');
  pg.innerHTML=P.paths.map(p=>`
    <div class="pc${p.id===sel?' sel':''}" style="${p.id===sel?`--sel-c:${p.a};border-color:${p.a};`:''}" onclick="sel=${p.id};render()">
      <div class="pn">${p.label}</div>
    </div>`).join('');
  const path=P.paths.find(p=>p.id===sel);
  const tabHtml=tabs.map(t=>`<button class="tab${t.k===tab?' on':''}" style="${t.k===tab?`--tab-c:${path.a};`:''}" onclick="tab='${t.k}';render()">${t.l}</button>`).join('');
  let content='';
  if(tab==='levels') content=renderLevels(path);
  else if(tab==='tools') content=renderTools(path);
  else if(tab==='learning') content=renderLearning(path);
  else if(tab==='interviews') content=renderInterviews(path);
  else if(tab==='roles') content=renderRoles(path);
  document.getElementById('det').innerHTML=`<div class="tabs" style="overflow-x:auto">${tabHtml}</div><div>${content}</div>`;
}
render();
</script>
