<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Software Engineering in the AI Era</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f5f4f0;
    --bg3: #eeedea;
    --text: #1a1a18;
    --text2: #5f5e5a;
    --text3: #9c9a92;
    --border: rgba(0,0,0,0.12);
    --radius-md: 8px;
    --radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg2: #252522;
      --bg3: #2e2e2b;
      --text: #e8e6de;
      --text2: #9c9a92;
      --text3: #6b6963;
      --border: rgba(255,255,255,0.1);
    }
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    padding: 32px 24px;
    max-width: 820px;
    margin: 0 auto;
  }

  header { margin-bottom: 28px; }
  header h1 { font-size: 22px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
  header p { font-size: 14px; color: var(--text2); }

  .pg {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 7px;
    margin-bottom: 14px;
  }
  @media (max-width: 500px) { .pg { grid-template-columns: repeat(2, 1fr); } }

  .pc {
    padding: 9px 11px;
    border-radius: var(--radius-md);
    border: 1.5px solid transparent;
    cursor: pointer;
    transition: border-color .15s, opacity .12s, transform .1s;
    user-select: none;
    background: var(--bg2);
  }
  .pc:hover { opacity: .82; transform: translateY(-1px); }
  .pc.sel { border-color: var(--sel-c); }
  .pn { font-size: 13px; font-weight: 500; color: var(--text); }

  .det {
    background: var(--bg2);
    border-radius: var(--radius-lg);
    padding: 20px 22px;
    border: 0.5px solid var(--border);
  }

  .dhead {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .dtitle { font-size: 16px; font-weight: 500; color: var(--text); }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 18px;
  }
  .ltag {
    font-size: 11px;
    padding: 2px 9px;
    border-radius: 20px;
    border: 0.5px solid;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .ldot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  .block { margin-bottom: 16px; }
  .bhead { display: flex; align-items: center; gap: 7px; margin-bottom: 7px; }
  .blab {
    font-size: 12px;
    font-weight: 500;
    padding: 2px 9px;
    border-radius: 20px;
    border: 0.5px solid;
  }

  .chips { display: flex; flex-wrap: wrap; gap: 5px; }
  .chip {
    font-size: 12px;
    padding: 3px 9px;
    border-radius: 20px;
    border: 0.5px solid;
  }

  .verdict {
    margin-top: 14px;
    padding: 12px 14px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border);
    background: var(--bg);
  }
  .vt { font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 3px; }
  .vb { font-size: 13px; color: var(--text); line-height: 1.5; }

  footer {
    margin-top: 28px;
    font-size: 12px;
    color: var(--text3);
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <h1>Software engineering in the AI era</h1>
  <p>Select a path to see which skills are rising, stable, or being automated away.</p>
</header>

<div class="pg" id="pg"></div>
<div class="det" id="det"></div>

<footer>New AI-era skills · Amplified importance · Still essential · Increasingly automated</footer>

<script>
const dark = matchMedia('(prefers-color-scheme: dark)').matches;

const CATS = [
  {key:'new',  label:'New AI-era skills',       bg: dark?'#26215C':'#EEEDFE', border: dark?'#AFA9EC':'#534AB7', text: dark?'#CECBF6':'#3C3489', dot: dark?'#AFA9EC':'#534AB7'},
  {key:'amp',  label:'Amplified importance',    bg: dark?'#04342C':'#E1F5EE', border: dark?'#5DCAA5':'#0F6E56', text: dark?'#9FE1CB':'#085041', dot: dark?'#5DCAA5':'#0F6E56'},
  {key:'base', label:'Still essential',         bg: dark?'#2C2C2A':'#F1EFE8', border: dark?'#B4B2A9':'#5F5E5A', text: dark?'#D3D1C7':'#444441', dot: dark?'#888780':'#888780'},
  {key:'auto', label:'Increasingly automated',  bg: dark?'#4A1B0C':'#FAECE7', border: dark?'#F0997B':'#993C1D', text: dark?'#F5C4B3':'#712B13', dot: dark?'#F0997B':'#D85A30'},
];

const paths = [
  {id:1, label:'Frontend', accent: dark?'#AFA9EC':'#534AB7',
    verdict:'The bar for shipping UI has risen. AI can generate layouts fast — your edge is taste, judgment, and building features around AI (chat UIs, streaming, agentic interfaces).',
    blocks:[
      {key:'new',  skills:['AI UI tools (v0, Bolt, Cursor)','Streaming UI patterns','LLM API integration','Designing chat interfaces','AI-powered search & autocomplete','React Server Components for AI']},
      {key:'amp',  skills:['System design thinking','Accessibility & WCAG','Performance optimization','TypeScript','Testing (e2e)','UX judgment']},
      {key:'base', skills:['React / Vue','CSS & responsive design','REST / GraphQL','Git']},
      {key:'auto', skills:['Boilerplate component code','Basic CRUD forms','Initial scaffolding','Copy-paste CSS patterns']},
    ]},
  {id:2, label:'Backend', accent: dark?'#5DCAA5':'#0F6E56',
    verdict:'The most critical new layer is AI integration plumbing — LLM APIs, vector stores, agent orchestration. Architecture and security judgment matter more as AI handles more boilerplate.',
    blocks:[
      {key:'new',  skills:['LLM API integration (streaming, tools)','RAG architecture & vector DBs','AI agent orchestration (LangChain, LlamaIndex)','Function calling & MCP','Prompt engineering','Structured outputs (JSON mode)']},
      {key:'amp',  skills:['API design & contracts','System architecture','Security & auth','Database optimization','Observability & tracing']},
      {key:'base', skills:['A primary language (Python, Go, Node.js)','SQL & NoSQL','Docker','Auth patterns','Unit testing']},
      {key:'auto', skills:['Boilerplate CRUD endpoints','Basic DB migrations','Repetitive utility scripts','Simple middleware']},
    ]},
  {id:3, label:'Full Stack', accent: dark?'#85B7EB':'#185FA5',
    verdict:'Full stack engineers who can integrate AI features end-to-end are the most in-demand profile right now. Product thinking + AI plumbing = rare and valuable.',
    blocks:[
      {key:'new',  skills:['AI feature integration (chat, search, generation)','Streaming responses (SSE, WebSockets)','Vector search integration','Prompt management','AI-powered user flows','LLM cost & latency optimization']},
      {key:'amp',  skills:['Product thinking','End-to-end system design','TypeScript','Security best practices','Performance profiling']},
      {key:'base', skills:['React','Node.js / Python backend','PostgreSQL','Docker','CI/CD basics']},
      {key:'auto', skills:['Boilerplate CRUD','Basic auth flows','Standard UI scaffolding','Repetitive migrations']},
    ]},
  {id:4, label:'DevOps', accent: dark?'#EF9F27':'#BA7517',
    verdict:'AI/ML infra is a new discipline within DevOps. GPU cluster management, model serving, and LLMOps are fast becoming core skills alongside traditional reliability engineering.',
    blocks:[
      {key:'new',  skills:['GPU & ML infrastructure (CUDA, NCCL)','Model serving (vLLM, TorchServe, Triton)','LLMOps (experiment tracking, evals)','Vector DB ops (Pinecone, Qdrant, Weaviate)','AI cost optimization (FinOps for inference)','Inference pipeline observability']},
      {key:'amp',  skills:['Platform engineering','Security & compliance (SOC2, zero trust)','SRE & SLOs','GitOps (ArgoCD)','Kubernetes (multi-tenant)']},
      {key:'base', skills:['Terraform / Pulumi','Docker & K8s basics','AWS / GCP / Azure','Prometheus & Grafana','Linux & Bash']},
      {key:'auto', skills:['Boilerplate IaC templates','Standard pipeline configs','Routine runbook tasks','Basic alerting setup']},
    ]},
  {id:5, label:'Data / ML', accent: dark?'#97C459':'#3B6D11',
    verdict:'This is the highest-demand path in the AI era. Traditional ML still matters but GenAI skills — fine-tuning, RAG, evals, agents — are now essential in every ML role.',
    blocks:[
      {key:'new',  skills:['Fine-tuning & RLHF','RAG pipeline design','LLM evals & benchmarking','AI agents & tool use','Prompt engineering (systematic)','Multimodal models (vision, audio)','Synthetic data generation']},
      {key:'amp',  skills:['MLOps & experiment tracking','Python (deeper)','Statistics & probability','Feature stores','Model interpretability (SHAP, LIME)','Data quality & pipelines']},
      {key:'base', skills:['PyTorch / TensorFlow','SQL & Spark','Pandas / NumPy','Scikit-learn','Jupyter / notebooks']},
      {key:'auto', skills:['Standard EDA templates','Basic feature engineering','Routine model evaluation scripts','Boilerplate training loops']},
    ]},
  {id:6, label:'Mobile', accent: dark?'#F0997B':'#993C1D',
    verdict:'On-device AI is a major differentiator for mobile apps. Engineers who can run models locally (privacy-first, low-latency) and design AI-native mobile UX are pulling ahead.',
    blocks:[
      {key:'new',  skills:['On-device ML (CoreML, TensorFlow Lite, ExecuTorch)','AR + AI (ARKit / ARCore + vision models)','Local LLMs on device','AI-powered UX patterns (smart suggestions, auto-fill)','Voice AI integration (Whisper, speech APIs)','LLM API integration in mobile apps']},
      {key:'amp',  skills:['Performance & battery optimization','Privacy-first architecture','Accessibility','Native module development','App security']},
      {key:'base', skills:['Swift / Kotlin','SwiftUI / Jetpack Compose','REST API integration','Push notifications','App Store / Play Store ops']},
      {key:'auto', skills:['Boilerplate list / detail screens','Basic form validation','Standard navigation patterns','Routine API wrappers']},
    ]},
  {id:7, label:'Security', accent: dark?'#F09595':'#A32D2D',
    verdict:'AI has created an entire new attack surface: prompt injection, model exfiltration, jailbreaks, and adversarial inputs. AI red teaming is one of the fastest-growing security specializations.',
    blocks:[
      {key:'new',  skills:['LLM security & prompt injection defense','AI red teaming','Model extraction & inversion attacks','RAG poisoning & data security','AI governance & compliance (EU AI Act)','Adversarial ML','OWASP LLM Top 10']},
      {key:'amp',  skills:['Threat modeling (AI systems)','API security','Zero trust architecture','Supply chain security','Incident response (AI incidents)']},
      {key:'base', skills:['Networking & protocols','Linux & Bash','OWASP Top 10 (web)','Burp Suite','Cloud security (IAM)']},
      {key:'auto', skills:['Routine vulnerability scans','Standard compliance checklists','Basic SAST/DAST runs','Boilerplate security configs']},
    ]},
  {id:8, label:'Eng Manager', accent: dark?'#B4B2A9':'#5F5E5A',
    verdict:'Managers who understand AI capabilities can unlock 10x productivity gains from their teams. The skill gap between AI-native and non-AI-native engineering managers is widening rapidly.',
    blocks:[
      {key:'new',  skills:['AI tool evaluation & rollout','Managing AI-assisted development workflows','Build vs buy for AI features','Measuring AI productivity impact','Prompt engineering (for team prompts & evals)','AI ethics & responsible deployment decisions']},
      {key:'amp',  skills:['Technical strategy & architecture review','Hiring for AI-era skill profiles','Stakeholder communication on AI timelines','OKR setting for AI initiatives']},
      {key:'base', skills:['1:1s & coaching','Sprint planning','Performance reviews','Cross-team coordination','Roadmap management']},
      {key:'auto', skills:['Status report drafting','Meeting summarization','Repetitive HR documentation','Standard onboarding materials']},
    ]},
];

let sel = 1;

function getC(key) { return CATS.find(c => c.key === key); }

function render() {
  const pg = document.getElementById('pg');
  pg.innerHTML = paths.map(p => `
    <div class="pc${p.id === sel ? ' sel' : ''}"
         style="${p.id === sel ? `--sel-c:${p.accent};border-color:${p.accent};` : ''}"
         onclick="sel=${p.id};render()">
      <div class="pn">${p.label}</div>
    </div>
  `).join('');

  const path = paths.find(p => p.id === sel);

  const legend = CATS.map(c => `
    <span class="ltag" style="background:${c.bg};border-color:${c.border};color:${c.text}">
      <span class="ldot" style="background:${c.dot}"></span>${c.label}
    </span>`).join('');

  const blocks = path.blocks.map(b => {
    const c = getC(b.key);
    return `<div class="block">
      <div class="bhead">
        <span class="blab" style="background:${c.bg};color:${c.text};border-color:${c.border}">${c.label}</span>
      </div>
      <div class="chips">${b.skills.map(s => `<span class="chip" style="background:${c.bg};color:${c.text};border-color:${c.border}">${s}</span>`).join('')}</div>
    </div>`;
  }).join('');

  document.getElementById('det').innerHTML = `
    <div class="dhead">
      <span class="dtitle">${path.label} in the AI era</span>
    </div>
    <div class="legend">${legend}</div>
    ${blocks}
    <div class="verdict">
      <div class="vt">Bottom line</div>
      <div class="vb">${path.verdict}</div>
    </div>
  `;
}

render();
</script>
</body>
</html>
